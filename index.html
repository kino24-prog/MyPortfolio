<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="あらぼしのポートフォリオ。ゲームプログラマー志望として、Unity / C# を使ったゲームジャム作品を紹介しています。"
    />
    <meta property="og:title" content="あらぼし | Game Programmer Portfolio" />
    <meta
      property="og:description"
      content="Unity / C# を中心に制作したゲームジャム作品、担当範囲、スキルをまとめたポートフォリオです。"
    />
    <meta property="og:type" content="website" />
    <title>あらぼし | Game Programmer Portfolio</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#top" aria-label="トップへ戻る">
        <span class="brand-mark">AB</span>
        <span>あらぼし</span>
      </a>
      <nav class="nav" aria-label="主要ナビゲーション">
        <a href="#projects">Projects</a>
        <a href="#skills">Skills</a>
        <a href="#contact">Contact</a>
      </nav>
    </header>

    <main id="top">
      <section class="hero section">
        <div class="hero-copy">
          <p class="eyebrow">Game Programmer Portfolio</p>
          <h1 id="profile-name">あらぼし</h1>
          <p class="hero-title" id="profile-title">ゲームプログラマー志望</p>
          <p class="hero-lead" id="profile-tagline">
            Unity / C# を中心に、チーム制作で遊びの手触りを形にしています。
          </p>
          <div class="hero-actions" id="hero-links" aria-label="外部リンク"></div>
        </div>
        <div class="hero-visual" aria-label="ゲーム制作をイメージしたビジュアル">
          <div class="screen">
            <div class="screen-topbar">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <div class="level-scene">
              <div class="player"></div>
              <div class="platform platform-a"></div>
              <div class="platform platform-b"></div>
              <div class="card card-a">MOVE</div>
              <div class="card card-b">JUMP</div>
              <div class="note note-a"></div>
              <div class="note note-b"></div>
            </div>
          </div>
        </div>
      </section>

      <section class="section about" aria-labelledby="about-title">
        <div class="section-heading">
          <p class="eyebrow">About</p>
          <h2 id="about-title">制作で大切にしていること</h2>
        </div>
        <div class="about-body" id="about-body"></div>
      </section>

      <section class="section projects" id="projects" aria-labelledby="projects-title">
        <div class="section-heading">
          <p class="eyebrow">Projects</p>
          <h2 id="projects-title">ゲームジャム作品</h2>
        </div>
        <div class="project-grid" id="project-list"></div>
      </section>

      <section class="section skills" id="skills" aria-labelledby="skills-title">
        <div class="section-heading">
          <p class="eyebrow">Skills</p>
          <h2 id="skills-title">できること</h2>
        </div>
        <div class="skill-grid" id="skill-list"></div>
      </section>

      <section class="section contact" id="contact" aria-labelledby="contact-title">
        <div class="contact-copy">
          <p class="eyebrow">Contact</p>
          <h2 id="contact-title">制作や連絡はこちらから</h2>
          <p>
            ゲーム制作、チーム開発、作品についての連絡はメールまたはSNSからお願いします。
          </p>
        </div>
        <div class="contact-links" id="contact-links"></div>
      </section>
    </main>

    <footer class="footer">
      <small>&copy; <span id="year"></span> あらぼし</small>
    </footer>

    <script src="data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
